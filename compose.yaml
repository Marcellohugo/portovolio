services:
  portfolio:
    build: .
    ports:
      - "${PORT:-3003}:3000"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
            - .git/
            - "*.log"
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
